<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="Sologan">
        <a href="../client/homepage.html">
            <div class="title">English Learning Platform</div>
        </a>
    </div>

    <div class="login">
        <div class="main">
            <div class="title">Sign up</div>

            <form method="POST" action="https://www.w3schools.com/action_page.php?">
                <div class="field">
                    <label for="email">Email</label>
                    <input id="email" type="email" name="email" placeholder="abc@gmail.com" class="input">
                </div>

                <div class="field">
                    <label for="password">Password</label>
                    <input id="password" type="password" name="password" placeholder="1234.." class="input">
                </div>

                <div class="field">
                    <label for="re_password">Rewrite password</label>
                    <input id="re_password" type="password" name="re_password" class="input" placeholder="1234..">
                </div>

                <button type="submit" class="submit">Sign in</button>
            </form>

            <div class="new_user">Already have an account? <a href="login.html">Log in</a></div>
        </div>
    </div>

</body>

</html>
