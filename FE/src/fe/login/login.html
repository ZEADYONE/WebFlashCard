<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="Sologan">
        <a href="../client/homepage.html">
            <div class="title">English Learning Platform</div>
        </a>
    </div>

    <div class="login">
        <div class="main">

            <div class="title">Login</div>

            <form method="POST" action="https://www.w3schools.com/action_page.php?">
                <div class="field">
                    <label for="email">Email</label>
                    <input id="email" type="email" name="email" placeholder="abc@gmail.com" class="input">
                </div>

                <div class="field">
                    <label for="password">Password</label>
                    <input id="password" type="password" name="password" placeholder="1234.." class="input">
                </div>

                <button type="submit" class="submit"><a style="color: azure;"
                        href="../client/flashcard/homepage.html">Login</a></button>
            </form>

            <div class="new_user">New user? <a href="sign_up.html">Sign up</a></div>
        </div>
    </div>

</body>

</html>
