<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Deck - English Learning Platform</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

    <header class="top-nav">
        <div class="brand">
            <h1>English Learning Platform</h1>
            <p>Master English with Interactive Exercises</p>
        </div>
        <div class="container-info" id="userDropdownTrigger">
            <i class="fa-regular fa-user"></i>
            <span class="user-name">Nguyễn Văn A</span>
            <i class="fa-solid fa-chevron-down mini-arrow"></i>

            <div class="info-dropdown" id="infoDropdown">
                <a href="/src/fe/info/view-info.html">
                    <div class="dropdown-item"><i class="fa-solid fa-circle-info"></i> Information</div>
                </a>
                <a href="/src/fe/client/community.html">
                    <div class="dropdown-item"><i class="fa-regular fa-user"></i> Client</div>
                </a>
                <a href="/src/fe/client/homepage.html">
                    <div class="dropdown-item"><i class="fa-solid fa-right-from-bracket"></i> Logout</div>
                </a>
            </div>
        </div>
        </div>
    </header>

    <main class="container">
        <h2 class="page-title">Edit Deck</h2>

        <section class="edit-top">
            <div class="form-group">
                <div class="input-item">
                    <label>Title</label>
                    <input type="text" value="Mixed">
                </div>
                <div class="input-item">
                    <label>Description</label>
                    <textarea>Advanced vocabulary for high scores.</textarea>
                </div>
                <div class="input-item">
                    <label>Scope</label>
                    <select id="scopeSelect">
                        <option value="public">Public</option>
                        <option value="private">Private</option>
                    </select>
                </div>
            </div>

            <div class="upload-area">
                <div class="upload-box">
                    <i class="fa-solid fa-layer-group"></i>
                    <i class="fa-solid fa-arrow-up"></i>
                </div>
            </div>

            <div class="all-btn">
                <a href="/src/fe/client/deck/create.html">
                    <button class="btn btn-pink">
                        <i class="fa-solid fa-wand-magic-sparkles"></i> Add card
                    </button>
                </a>
                <div class="button-group">
                    <button class="btn btn-purple"><i class="fa-solid fa-box-archive"></i> Save changes</button>
                    <a href="/src/fe/admin/deck.html">
                        <button class="btn btn-gray">
                            <i class="fa-solid fa-xmark"></i> Cancel
                        </button>
                    </a>
                </div>
            </div>

        </section>

        <section class="flashcards-container">
            <div class="cards-grid" id="cardsGrid">
            </div>

            <div class="pagination">
                <span>&lt;</span>
                <span class="active">1</span>
                <span>2</span>
                <span>3</span>
                <span>4</span>
                <span>......</span>
                <span>20</span>
                <span>21</span>
                <span>22</span>
                <span>23</span>
                <span>&gt;</span>
            </div>
        </section>
    </main>

    <script src="js/script.js"></script>
</body>

</html>
