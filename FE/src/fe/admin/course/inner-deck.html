<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Learning Platform</title>
    <link rel="stylesheet" href="/src/fe/client/deck/css/inner-deck.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

    <header class="top-nav">
        <div class="brand">
            <h1>English Learning Platform</h1>
            <p>Master English with Interactive Exercises</p>
        </div>
        <div class="container-info" id="userDropdownTrigger">
            <i class="fa-regular fa-user"></i>
            <span class="user-name">Nguyễn Văn A</span>
            <i class="fa-solid fa-chevron-down mini-arrow"></i>

            <div class="info-dropdown" id="infoDropdown">
                <a href="/src/fe/info/view-info.html">
                    <div class="dropdown-item"><i class="fa-solid fa-circle-info"></i> Information</div>
                </a>
                <a href="/src/fe/client/community.html">
                    <div class="dropdown-item"><i class="fa-regular fa-user"></i> Client</div>
                </a>
                <a href="/src/fe/client/homepage.html">
                    <div class="dropdown-item"><i class="fa-solid fa-right-from-bracket"></i> Logout</div>
                </a>
            </div>
        </div>
        </div>
    </header>

    <main>
        <i class="fa-solid fa-arrow-left exit" onclick="history.back()"></i>
        <section class="title-section">
            <div>
                <h2>Mixed</h2>
                <p>Advanced vocabulary.</p>
            </div>
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search flashcard ...">
            </div>
            <a href="/src/fe/admin/course/create.html">
                <button class="btn add">Add card</button>
            </a>
        </section>

        <!-- <section class="action-buttons">
            <button class="btn">Study</button>
            <button class="btn">Play Game</button>
        </section> -->

        <section class="flashcards-container">
            <div class="cards-grid" id="cardsGrid">
            </div>

            <div class="pagination">
                <span>&lt;</span>
                <span class="active">1</span>
                <span>2</span>
                <span>3</span>
                <span>4</span>
                <span>......</span>
                <span>20</span>
                <span>21</span>
                <span>22</span>
                <span>23</span>
                <span>&gt;</span>
            </div>
        </section>
    </main>

    <script src="/src/fe/admin/course/script.js"></script>
</body>

</html>
