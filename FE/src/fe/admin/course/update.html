<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Card - English Learning Platform</title>
    <link rel="stylesheet" href="/src/fe/client/deck/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

    <header class="top-nav">
        <div class="brand">
            <h1>English Learning Platform</h1>
            <p>Master English with Interactive Exercises</p>
        </div>
        <div class="container-info" id="userDropdownTrigger">
            <i class="fa-regular fa-user"></i>
            <span class="user-name">Nguyễn Văn A</span>
            <i class="fa-solid fa-chevron-down mini-arrow"></i>

            <div class="info-dropdown" id="infoDropdown">
                <a href="/src/fe/info/view-info.html">
                    <div class="dropdown-item"><i class="fa-solid fa-circle-info"></i> Information</div>
                </a>
                <a href="/src/fe/client/community.html">
                    <div class="dropdown-item"><i class="fa-regular fa-user"></i> Client</div>
                </a>
                <a href="/src/fe/client/homepage.html">
                    <div class="dropdown-item"><i class="fa-solid fa-right-from-bracket"></i> Logout</div>
                </a>
            </div>
        </div>
        </div>
    </header>

    <main class="container">
        <i class="fa-solid fa-wrench"
            style="font-size: 50px; position: relative; left:calc(50% - 50px); margin-bottom: 10px;"></i>

        <form id="addCardForm" class="form-content" action="https://www.w3schools.com/action_page.php" method="post"
            enctype="multipart/form-data">
            <div class="form-row">
                <div class="form-group">
                    <label>Word</label>
                    <input type="text" id="word" name="word" placeholder="Word" value="Hello">
                </div>
                <div class="form-group">
                    <label>Transliteration</label>
                    <input type="text" id="transliteration" name="transliteration" placeholder="Transliteration"
                        value="həˈlō">
                </div>
                <div class="form-group">
                    <label>Vietnamese</label>
                    <input type="text" id="vietnamese" name="vietnamese" placeholder="Vietnamese" value="Xin chào">
                </div>
            </div>

            <div class="form-group full-width">
                <label>Example</label>
                <textarea id="example" name="example" placeholder="Example"> Hello Linda</textarea>
            </div>

            <div class="form-group full-width">
                <label>Definition</label>
                <textarea id="definition" name="definition"
                    placeholder="Definition ">Là 1 hành động thể hiện sự chào đón</textarea>
            </div>

            <div class="bottom-section">
                <div class="image-upload-wrapper">
                    <label style="font-weight: bold;font-size: 1.1rem;">Image</label>
                    <div class="image-box" onclick="document.getElementById('fileInput').click()"
                        style="background-image: url('https://th.bing.com/th/id/OIP.tV1Yut2akoObzBb9nU_P-AHaD4?w=276&h=180&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3');">
                    </div>
                    <input type="file" id="fileInput" name="image" hidden>
                </div>

                <div class="sound-and-actions">
                    <div class="form-group">
                        <label>Sound</label>
                        <input type="file" id="sound" name="sound">
                    </div>
                    <div class="button-group">
                        <button type="submit" class="btn btn-add">Update</button>
                        <button type="button" class="btn btn-back" onclick="history.back()">Cancel</button>
                    </div>
                </div>
            </div>
        </form>
    </main>

    <script src="/src/fe/client/deck/js/script.js"></script>
</body>

</html>
