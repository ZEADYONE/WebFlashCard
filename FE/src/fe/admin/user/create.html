<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <title>Create User - English Learning Platform</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="app-container">
        <header class="top-header">
            <div class="brand-info">
                <h1>English Learning Platform</h1>
                <p>Master English with Interactive Exercises</p>
            </div>
            <div class="profile-circle"></div>
        </header>

        <main class="content-area">
            <div class="form-container">
                <div class="form-header">
                    <h2 class="form-title">Create user</h2>
                    <div class="button-group">
                        <button type="button" class="btn-back" onclick="history.back()">Back</button>
                        <button type="submit" form="userForm" class="btn-create">Create</button>
                    </div>
                </div>

                <form id="userForm" class="user-grid-form" action="" method="">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" placeholder="Email" required>
                    </div>

                    <div class="form-group">
                        <label>User name</label>
                        <input type="text" placeholder="Username" required>
                    </div>

                    <div class="form-group">
                        <label>FullName</label>
                        <input type="text" placeholder="FullName">
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" placeholder="Password" required>
                    </div>

                    <div class="form-group">
                        <label>Phone number</label>
                        <input type="text" placeholder="PhoneNumber">
                    </div>

                    <div class="form-group">
                        <label>Date of Birth</label>
                        <input type="text" placeholder="DateOfBirth">
                    </div>

                    <div class="form-group">
                        <label>Bio</label>
                        <textarea rows="6" placeholder="Bio"></textarea>
                    </div>

                    <div class="right-column-group">
                        <div class="form-group">
                            <label>Role</label>
                            <select>
                                <option value="user">User</option>
                                <option value="admin">Admin</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Location</label>
                            <input type="text" placeholder="Location">
                        </div>
                    </div>
                </form>
            </div>
        </main>
    </div>
</body>

</html>
