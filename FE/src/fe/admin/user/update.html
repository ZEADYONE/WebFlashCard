<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <title>Create User - English Learning Platform</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="app-container">
        <header class="top-nav">
            <div class="brand">
                <h1>English Learning Platform</h1>
                <p>Master English with Interactive Exercises</p>
            </div>
            <div class="container-info" id="userDropdownTrigger">
                <i class="fa-regular fa-user"></i>
                <span class="user-name">Nguyễn Văn A</span>
                <i class="fa-solid fa-chevron-down mini-arrow"></i>

                <div class="info-dropdown" id="infoDropdown">
                    <a href="/src/fe/info/view-info.html">
                        <div class="dropdown-item"><i class="fa-solid fa-circle-info"></i> Information</div>
                    </a>
                    <a href="/src/fe/client/community.html">
                        <div class="dropdown-item"><i class="fa-regular fa-user"></i> Client</div>
                    </a>
                    <a href="/src/fe/client/homepage.html">
                        <div class="dropdown-item"><i class="fa-solid fa-right-from-bracket"></i> Logout</div>
                    </a>
                </div>
            </div>
    </div>
    </header>

    <main class="content-area">
        <div class="form-container">
            <div class="form-header">
                <i style="font-size: 50px;" class="fa-solid fa-wrench"></i>
                <div class="button-group">
                    <button type="button" class="btn-back" onclick="history.back()">Back</button>
                    <button type="submit" form="userForm" class="btn-create">Update</button>
                </div>
            </div>

            <form id="userForm" class="user-grid-form" action="" method="">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" value="nvadt@gmail.com" required disabled>
                </div>

                <div class="form-group">
                    <label>User name</label>
                    <input type="text" value="Nguyen Van A" required disabled>
                </div>

                <div class="form-group">
                    <label>FullName</label>
                    <input type="text" value="Nguyễn Văn A">
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" value="1234567" disabled>
                </div>

                <div class="form-group">
                    <label>Phone number</label>
                    <input type="text" value="0000000000" disabled>
                </div>

                <div class="form-group">
                    <label>Date of Birth</label>
                    <input type="date" value="2005-11-11">
                </div>

                <div class="form-group">
                    <label>Bio</label>
                    <textarea rows="6">Bla bla</textarea>
                </div>

                <div class="right-column-group">
                    <div class="form-group">
                        <label>Role</label>
                        <span>Admin</span>
                    </div>
                    <div class="form-group">
                        <label>Location</label>
                        <input type="text" value="Ho Chi Minh City">
                    </div>
                </div>
            </form>
        </div>
    </main>
    </div>
    <script src="js/scrip.js"></script>
</body>

</html>
