<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>Create User - English Learning Platform</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="app-container">
        <header class="top-nav">
            <div class="brand">
                <h1>English Learning Platform</h1>
                <p>Master English with Interactive Exercises</p>
            </div>
            <div class="nav-links">
                <a href="homepage.html">HOME</a>
                <a href="community.html">FLASHCARD</a>

            </div>
            <div class="profile-circle"></div>
        </header>

        <main class="content-area">
            <div class="form-container">
                <div class="form-header">
                    <i style="font-size: 50px;" class="fa-regular fa-eye"></i>
                    <div class="button-group">
                        <button type="button" class="btn-back" onclick="history.back()">Back</button>
                    </div>
                </div>

                <form id="userForm" class="user-grid-form" action="" method="">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" value="cuongdt@gmail.com" required>
                    </div>

                    <div class="form-group">
                        <label>User name</label>
                        <input type="text" value="Zeady" required>
                    </div>

                    <div class="form-group">
                        <label>FullName</label>
                        <input type="text" value="Do Tri Cuong">
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" value="1234567">
                    </div>

                    <div class="form-group">
                        <label>Phone number</label>
                        <input type="text" value="0123456789">
                    </div>

                    <div class="form-group">
                        <label>Date of Birth</label>
                        <input type="text" value="01/01/1836">
                    </div>

                    <div class="form-group">
                        <label>Bio</label>
                        <textarea rows="6">Bla bla</textarea>
                    </div>

                    <div class="right-column-group">
                        <div class="form-group">
                            <label>Role</label>
                            <span>Admin</span>
                        </div>
                        <div class="form-group">
                            <label>Location</label>
                            <input type="text" value="Ho Chi Minh City">
                        </div>
                    </div>
                </form>
            </div>
        </main>
    </div>
</body>

</html>
