<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Card - English Learning Platform</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

    <header>
        <header class="top-nav">
            <div class="brand">
                <h1>English Learning Platform</h1>
                <p>Master English with Interactive Exercises</p>
            </div>
            <div class="nav-links">
                <a href="/src/fe/client/homepage.html">HOME</a>
                <a href="/src/fe/client/community.html">FLASHCARD</a>


            </div>
            <div class="profile-circle"></div>
        </header>

        <main class="container">
            <i class="fa-solid fa-eye"
                style="font-size: 50px; position: relative; left:calc(50% - 50px); margin-bottom: 10px;"></i>

            <form id="addCardForm" class="form-content">
                <div class="form-row">
                    <div class="form-group">
                        <label>Word</label>
                        <input type="text" id="word" value="Hello">
                    </div>
                    <div class="form-group">
                        <label>Transliteration</label>
                        <input type="text" id="transliteration" value="hə'lō">
                    </div>
                    <div class="form-group">
                        <label>Vietnamese</label>
                        <input type="text" id="vietnamese" value="Xin chào">
                    </div>
                </div>

                <div class="form-group full-width">
                    <label>Example</label>
                    <textarea id="example">Hi Paul. It's been a long time since we last met.</textarea>
                </div>

                <div class="form-group full-width">
                    <label>Definition</label>
                    <textarea id="definition">used when meeting or greeting someone</textarea>
                </div>

                <div class="bottom-section">
                    <div class="image-upload-wrapper">
                        <label>Image</label>
                        <div class="image-box" onclick="document.getElementById('fileInput').click()"
                            style="background-image: url('https://th.bing.com/th/id/OIP.tV1Yut2akoObzBb9nU_P-AHaD4?w=276&h=180&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3');">
                        </div>
                    </div>

                    <div class="sound-and-actions">
                        <div class="form-group">
                            <label>Sound</label>
                            <input type="text" id="sound" value="sound.wav">
                        </div>
                        <div class="button-group">
                            <button type="button" class="btn btn-back" onclick="history.back()">Back</button>
                        </div>
                    </div>
                </div>
            </form>
        </main>

        <script src="js/script.js"></script>
</body>

</html>
