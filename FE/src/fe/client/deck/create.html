<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Card - English Learning Platform</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

    <header>
        <div class="logo">
            <h1>English Learning Platform</h1>
            <p>Master English with Interactive Exercises</p>
        </div>
        <nav>
            <a href="../homepage.html">HOME</a>
            <a href="../community.html">FLASHCARD</a>
        </nav>
        <div class="profile-icon"></div>
    </header>

    <main class="container">
        <h1 class="page-title">Add card</h1>

        <form id="addCardForm" class="form-content" action="https://www.w3schools.com/action_page.php" method="post"
            enctype="multipart/form-data">
            <div class="form-row">
                <div class="form-group">
                    <label>Word</label>
                    <input type="text" id="word" name="word" placeholder="Word">
                </div>
                <div class="form-group">
                    <label>Transliteration</label>
                    <input type="text" id="transliteration" name="transliteration" placeholder="Transliteration">
                </div>
                <div class="form-group">
                    <label>Vietnamese</label>
                    <input type="text" id="vietnamese" name="vietnamese" placeholder="Vietnamese">
                </div>
            </div>

            <div class="form-group full-width">
                <label>Example</label>
                <textarea id="example" name="example" placeholder="Example"></textarea>
            </div>

            <div class="form-group full-width">
                <label>Definition</label>
                <textarea id="definition" name="definition" placeholder="Definition "></textarea>
            </div>

            <div class="bottom-section">
                <div class="image-upload-wrapper">
                    <label style="font-weight: bold;font-size: 1.1rem;">Image</label>
                    <div class="image-box" onclick="document.getElementById('fileInput').click()">
                        <i class="fa-solid fa-upload"></i>
                    </div>
                    <input type="file" id="fileInput" name="image" hidden>
                </div>

                <div class="sound-and-actions">
                    <div class="form-group">
                        <label>Sound</label>
                        <input type="file" id="sound" name="sound">
                    </div>
                    <div class="button-group">
                        <button type="submit" class="btn btn-add">Add</button>
                        <button type="button" class="btn btn-back" onclick="history.back()">Back</button>
                    </div>
                </div>
            </div>
        </form>
    </main>

    <script src="js/script.js"></script>
</body>

</html>
